name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag to create or update, for example v0.1.0. Leave empty to only upload workflow artifacts."
        required: false
        type: string
  push:
    branches:
      - main
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  desktop-bundles:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux desktop bundles
            os: ubuntu-latest
            rust_targets: ""
            build_script: npm run desktop:build:linux
            artifact_name: flowmint-linux-bundles
            artifact_paths: |
              target/release/flowmint-desktop
              target/release/bundle/deb/*.deb
              target/release/bundle/rpm/*.rpm
          - name: macOS Apple Silicon bundles
            os: macos-latest
            rust_targets: aarch64-apple-darwin
            build_script: npm --workspace apps/desktop run tauri -- build --bundles app,dmg --target aarch64-apple-darwin
            artifact_name: flowmint-macos-aarch64-bundles
            artifact_paths: |
              target/aarch64-apple-darwin/release/bundle/macos/*.app
              target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          - name: macOS Intel bundles
            os: macos-latest
            rust_targets: x86_64-apple-darwin
            build_script: npm --workspace apps/desktop run tauri -- build --bundles app,dmg --target x86_64-apple-darwin
            artifact_name: flowmint-macos-x86_64-bundles
            artifact_paths: |
              target/x86_64-apple-darwin/release/bundle/macos/*.app
              target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - name: Windows desktop bundles
            os: windows-latest
            rust_targets: ""
            build_script: npm run desktop:build:windows
            artifact_name: flowmint-windows-bundles
            artifact_paths: |
              target/release/bundle/msi/*.msi

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            curl \
            file \
            libayatana-appindicator3-dev \
            libdbus-1-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            librsvg2-dev \
            libssl-dev \
            libwebkit2gtk-4.1-dev \
            libxdo-dev \
            pkg-config \
            wget

      - name: Setup Rust
        if: matrix.rust_targets == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Setup Rust with targets
        if: matrix.rust_targets != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify
        run: npm run check

      - name: Build desktop bundles
        run: ${{ matrix.build_script }}

      - name: Upload desktop bundles
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_paths }}

  publish-github-release:
    name: Publish GitHub Release assets
    runs-on: ubuntu-latest
    needs: desktop-bundles
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    permissions:
      contents: write

    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: List release assets
        run: find release-artifacts -maxdepth 6 -type f -print

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists; uploading assets."
          else
            gh release create "$RELEASE_TAG" \
              --draft \
              --title "Flowmint $RELEASE_TAG" \
              --notes "Desktop bundles generated by GitHub Actions. macOS and Windows artifacts still require install smoke testing before platform support is declared."
          fi
          gh release upload "$RELEASE_TAG" \
            $(find release-artifacts -type f \( -name '*.deb' -o -name '*.rpm' -o -name '*.dmg' -o -name '*.msi' -o -name 'flowmint-desktop' \) -print) \
            --clobber
